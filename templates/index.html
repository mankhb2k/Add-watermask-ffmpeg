<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>FFmpeg Batch Processor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="container">
      <h2>Chèn Logo Hàng Loạt</h2>
      <div class="group">
        <label>Chọn Logo (PNG/SVG):</label>
        <input type="file" id="logo" accept="image/*" />
      </div>
      <div class="group">
        <label>Chọn nhiều Video:</label>
        <input type="file" id="videos" multiple accept="video/*" />
      </div>
      <div class="group">
        <label>Thư mục lưu sau khi xử lý:</label>
        <div class="output-options">
          <input type="text" id="output_dir" placeholder="Nhập đường dẫn (để trống = outputs)" />
          <span class="or">hoặc</span>
          <button type="button" id="btn_pick_folder" class="btn-secondary">Chọn thư mục lưu</button>
        </div>
        <span class="hint" id="picked_folder_hint"></span>
      </div>
      <button onclick="startProcessing()" id="btn">Bắt đầu xử lý</button>
      <div id="status"></div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
